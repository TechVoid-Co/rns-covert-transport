# Reticulum over Yandex Mail
#
# Create two accounts at mail.yandex.ru. Enable IMAP.
# Swap account and peer_address on each node.

[reticulum]
  enable_transport = no
  share_instance = yes

[interfaces]
  [[Mail Transport]]
    type = MailInterface
    enabled = yes
    account = node_a@yandex.ru
    password = app_password_here
    peer_address = node_b@yandex.ru
    imap_host = imap.yandex.ru
    imap_port = 993
    smtp_host = smtp.yandex.ru
    smtp_port = 465
    locale = ru
    encoding = blob
    inner_size = 1280
    poll_interval = 30
    max_sends_per_hour = 30
    batch_window = 5
    cleanup = yes
