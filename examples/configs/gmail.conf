# Reticulum over Gmail
#
# Create two accounts. Enable IMAP in Gmail settings.
# Generate app passwords at myaccount.google.com/apppasswords.
# Swap account and peer_address on each node.

[reticulum]
  enable_transport = no
  share_instance = yes

[interfaces]
  [[Mail Transport]]
    type = MailInterface
    enabled = yes
    account = node_a@gmail.com
    password = app_password_here
    peer_address = node_b@gmail.com
    imap_host = imap.gmail.com
    imap_port = 993
    smtp_host = smtp.gmail.com
    smtp_port = 465
    locale = en
    encoding = blob
    inner_size = 1280
    poll_interval = 30
    max_sends_per_hour = 30
    batch_window = 5
    cleanup = yes
